<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DropFix Limited</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    color: white;
    text-align: center;
    background: url('bg.jpg') no-repeat center center/cover;
}

.overlay {
    background: rgba(0,0,0,0.6);
    min-height: 100vh;
    padding: 40px 15px;
}

/* LOGO */
.logo {
    width: 200px;
    display: block;
    margin: 0 auto 10px;
}

/* TEXT */
h1 {
    font-size: 36px;
    margin: 10px 0;
}

p {
    color: #ccc;
    margin-bottom: 30px;
}

/* CONTAINER */
.container {
    max-width: 380px;
    margin: auto;
}

/* PREMIUM BUTTON */
.button {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    width: 100%;
    padding: 14px;
    margin: 12px 0;
    border-radius: 12px;
    text-decoration: none;
    font-weight: 600;
    font-size: 16px;
    
    backdrop-filter: blur(10px);
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.2);
    
    transition: 0.3s;
}

.button:hover {
    transform: scale(1.03);
}

/* COLORS */
.whatsapp {
    border-left: 4px solid #00c853;
}

.email {
    border-left: 4px solid #1e88e5;
}

.review {
    border-left: 4px solid #ff6d00;
}

/* ICON */
.icon {
    width: 22px;
}

/* MAP */
.map {
    width: 100%;
    height: 250px;
    border-radius: 12px;
    margin-top: 20px;
}

footer {
    margin-top: 25px;
    color: #aaa;
}
</style>
</head>

<body>

<div class="overlay">

    <!-- BIG LOGO -->
    <img src="logo.png" class="logo">

    <h1>DROPFIX LIMITED</h1>
    <p>Smartphone Repair Experts</p>

    <div class="container">

        <a class="button whatsapp" href="https://wa.me/447550722762">
            <img class="icon" src="https://img.icons8.com/ios-filled/50/ffffff/whatsapp.png"/>
            Ali Asghar
        </a>

        <a class="button whatsapp" href="https://wa.me/447440172501">
            <img class="icon" src="https://img.icons8.com/ios-filled/50/ffffff/whatsapp.png"/>
            Malik Usman
        </a>

        <a class="button email" href="mailto:DROPFIXLIMITED@GMAIL.COM">
            <img class="icon" src="https://img.icons8.com/ios-filled/50/ffffff/email.png"/>
            Email Us
        </a>

        <a class="button review" href="https://maps.app.goo.gl/syqt7nDaxvzTeAiS8?g_st=iw">
            ⭐ Leave a Review
        </a>

        <iframe class="map"
        src="https://www.google.com/maps?q=Walthamstow London&output=embed">
        </iframe>

    </div>

    <footer>
        © DropFix Limited
    </footer>

</div>

</body>
</html>
